name: Auto Revert on Smoke Failure

# Fires when the CI workflow on `main` completes with a failing
# `smoke-prod` job. Opens a revert PR labeled `auto-revert` targeting
# the exact main commit whose smoke check failed. The Reviewer (Codex) merges the revert
# immediately — plan-present / scope-check are relaxed for PRs that
# carry the `auto-revert` label.
#
# Rule: never investigate-then-fix on main. Revert first, always.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  revert:
    name: Open revert PR
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Verify auto-revert token is configured
        env:
          AUTO_REVERT_TOKEN: ${{ secrets.AUTO_REVERT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$AUTO_REVERT_TOKEN" ]; then
            echo "AUTO_REVERT_TOKEN is required so revert PR events trigger normal pull_request CI."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AUTO_REVERT_TOKEN }}

      - name: Verify smoke-prod was the failing job
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          failed=$(gh run view "$RUN_ID" --json jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name')
          echo "failed jobs: $failed"
          if echo "$failed" | grep -qi "smoke"; then
            echo "trigger=true" >> "$GITHUB_OUTPUT"
          else
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            echo "No smoke failure; skipping auto-revert."
          fi

      - name: Identify failed main commit
        if: steps.check.outputs.trigger == 'true'
        id: merge
        run: |
          set -euo pipefail
          sha="${{ github.event.workflow_run.head_sha }}"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short "$sha")" >> "$GITHUB_OUTPUT"
          echo "subject=$(git log -1 --pretty=format:%s "$sha")" >> "$GITHUB_OUTPUT"

      - name: Guard against revert loops
        if: steps.check.outputs.trigger == 'true'
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ steps.merge.outputs.sha }}
          SHORT: ${{ steps.merge.outputs.short }}
        run: |
          set -euo pipefail
          branch="auto-revert/${SHORT}"
          message=$(git log -1 --pretty=%B "$SHA")
          if [ "${HEAD_BRANCH#auto-revert/}" != "$HEAD_BRANCH" ] || echo "$message" | grep -Eiq '(^auto-revert:|auto-revert/)'; then
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            echo "Failed commit is already an auto-revert; skipping."
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            echo "Auto-revert branch already exists for $SHORT; skipping."
            exit 0
          fi
          existing_pr=$(gh pr list --state open --head "$branch" --json number --jq '.[0].number // ""')
          if [ -n "$existing_pr" ]; then
            echo "trigger=false" >> "$GITHUB_OUTPUT"
            echo "Auto-revert PR #$existing_pr already exists for $SHORT; skipping."
            exit 0
          fi
          echo "trigger=true" >> "$GITHUB_OUTPUT"

      - name: Create revert branch
        if: steps.guard.outputs.trigger == 'true'
        env:
          SHA: ${{ steps.merge.outputs.sha }}
          SHORT: ${{ steps.merge.outputs.short }}
        run: |
          set -euo pipefail
          branch="auto-revert/${SHORT}"
          git config user.name "corgtex-auto-revert"
          git config user.email "auto-revert@corgtex.local"
          git checkout -b "$branch"
          # -m 1 handles merge commits; harmless on a non-merge commit.
          git revert --no-edit -m 1 "$SHA" || git revert --no-edit "$SHA"
          git push origin "$branch"
          echo "BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Open revert PR
        if: steps.guard.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTO_REVERT_TOKEN }}
          SUBJECT: ${{ steps.merge.outputs.subject }}
          SHORT: ${{ steps.merge.outputs.short }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "auto-revert: ${SUBJECT} (${SHORT})" \
            --label auto-revert \
            --label forbidden-path-approved \
            --label large-change-approved \
            --body "Production smoke test failed after the merge of \`${SHORT}\` (\"${SUBJECT}\"). This PR reverts that change. Failed CI run: ${RUN_URL}"
