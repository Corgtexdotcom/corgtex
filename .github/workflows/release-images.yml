name: Release Images

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish web/worker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha_tag="sha-${GITHUB_SHA}"
          version_tag="${GITHUB_REF_NAME//\//-}"
          echo "web_sha=${repo}/web:${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "worker_sha=${repo}/worker:${sha_tag}" >> "$GITHUB_OUTPUT"
          echo "web_version=${repo}/web:${version_tag}" >> "$GITHUB_OUTPUT"
          echo "worker_version=${repo}/worker:${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ${{ steps.image.outputs.web_sha }}
            ${{ steps.image.outputs.web_version }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.image.outputs.worker_sha }}
            ${{ steps.image.outputs.worker_version }}
