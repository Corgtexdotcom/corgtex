"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "DOCKERFILE"
dockerfilePath = "/deploy/Dockerfile.worker"
watchPatterns = [
  "apps/worker/**",
  "apps/web/package.json",
  "apps/site/package.json",
  "packages/shared/**",
  "packages/workflows/**",
  "packages/agents/**",
  "packages/knowledge/**",
  "packages/models/**",
  "packages/**/package.json",
  "prisma/**",
  "package.json",
  "package-lock.json",
  "tsconfig.json",
  "tsconfig.base.json",
  "eslint.config.mjs",
  "deploy/Dockerfile.worker",
  "deploy/railway.worker.toml",
]

[deploy]

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
runtime = "V2"
